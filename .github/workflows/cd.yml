name: CD

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify backend
        working-directory: backend
        run: |
          go test ./...
          go build ./cmd/api

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload source bundle
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          REMOTE_TMP_DIR: ${{ secrets.REMOTE_TMP_DIR }}
        run: |
          rsync -rltz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'build' \
            -e "ssh -p ${SERVER_PORT:-22}" \
            ./ "${SERVER_USER}@${SERVER_HOST}:${REMOTE_TMP_DIR:-/tmp/myproj-release}/"

      - name: Sync release and deploy remotely
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          REMOTE_TMP_DIR: ${{ secrets.REMOTE_TMP_DIR }}
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_USER: ${{ secrets.APP_USER }}
          APP_GROUP: ${{ secrets.APP_GROUP }}
          API_SERVICE: ${{ secrets.API_SERVICE }}
          FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "REMOTE_TMP_DIR='${REMOTE_TMP_DIR:-/tmp/myproj-release}' APP_DIR='${APP_DIR:-/opt/myproj}' APP_USER='${APP_USER:-myproj}' APP_GROUP='${APP_GROUP:-myproj}' API_SERVICE='${API_SERVICE:-myproj-api}' FRONTEND_SERVICE='${FRONTEND_SERVICE:-myproj-frontend}' bash -s" <<'EOF'
          set -Eeuo pipefail

          sudo mkdir -p "$APP_DIR"
          sudo rm -rf "$APP_DIR/go" "$APP_DIR/.gopath"
          sudo rsync -a --delete \
            --exclude '.env.production' \
            --exclude '.env.local' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/node_modules' \
            --exclude 'build' \
            "$REMOTE_TMP_DIR/" "$APP_DIR/"
          sudo chown -R "$APP_USER:$APP_GROUP" "$APP_DIR"

          cd "$APP_DIR"
          bash deploy/scripts/deploy.sh
          EOF
